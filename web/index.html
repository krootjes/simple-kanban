<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <span class="logo" id="app-name">Kanban</span>
    <div class="header-center">
      <div class="quick-add-wrap">
        <div class="quick-add-row">
          <select id="quick-add-col" class="quick-add-col-select"></select>
          <select id="quick-add-category" class="quick-add-col-select is-placeholder" onchange="onQuickAddCategoryChange(this)"></select>
          <input type="text" id="quick-add-input" autocomplete="off"
                 placeholder="Quick add card... (Enter to create)">
        </div>
        <div id="quick-add-tag-sel" class="quick-add-tag-sel"></div>
      </div>
    </div>
    <div class="header-right">
      <a href="/settings" class="btn-ghost">Settings</a>
      <button class="btn-ghost" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="toolbar">
    <div id="tag-filter" class="tag-filter"></div>
    <div id="category-filter" class="category-filter"></div>
  </div>

  <main>
    <div id="board" class="board"></div>
  </main>

  <!-- Card Modal -->
  <div id="card-modal" class="modal-overlay hidden" onclick="overlayClick(event, 'card-modal')">
    <div class="modal">
      <div class="modal-header">
        <h2 id="card-modal-title">Add Card</h2>
        <button class="modal-close" onclick="closeModal('card-modal')">×</button>
      </div>
      <form id="card-form" onsubmit="submitCard(event)">
        <div class="form-group">
          <label id="lbl-card-title">Title</label>
          <input type="text" id="card-title" required>
        </div>
        <div class="form-group">
          <label id="lbl-card-desc">Description</label>
          <textarea id="card-desc" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label id="lbl-card-due">Due Date</label>
          <div class="due-date-input-row">
            <input type="date" id="card-due-date" oninput="updateClearDueDateBtn()" onchange="updateClearDueDateBtn()">
            <button type="button" id="card-clear-due" class="btn-clear-date hidden" onclick="clearDueDate()">× Clear</button>
          </div>
        </div>
        <div class="form-group">
          <label id="lbl-card-category">Category</label>
          <div id="card-category-selector" class="card-tag-selector"></div>
        </div>
        <div class="form-group">
          <label id="lbl-card-tags">Tags</label>
          <div id="card-tag-selector" class="card-tag-selector"></div>
          <p id="card-no-tags-hint" class="muted-text hidden"></p>
        </div>
        <div class="modal-actions">
          <div>
            <button type="button" id="card-delete-btn" onclick="deleteCurrentCard()" class="btn-danger hidden">Delete</button>
          </div>
          <div style="display:flex;gap:8px">
            <button type="button" onclick="closeModal('card-modal')" class="btn-secondary">Cancel</button>
            <button type="submit" class="btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Column Modal -->
  <div id="column-modal" class="modal-overlay hidden" onclick="overlayClick(event, 'column-modal')">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 id="column-modal-title">Add Column</h2>
        <button class="modal-close" onclick="closeModal('column-modal')">×</button>
      </div>
      <form id="column-form" onsubmit="submitColumn(event)">
        <div class="form-group">
          <label id="lbl-col-name">Name</label>
          <input type="text" id="column-name-input" required>
        </div>
        <div class="modal-actions">
          <div></div>
          <div style="display:flex;gap:8px">
            <button type="button" onclick="closeModal('column-modal')" class="btn-secondary">Cancel</button>
            <button type="submit" class="btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/locale/en.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
